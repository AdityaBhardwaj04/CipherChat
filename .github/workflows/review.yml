name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get diff
        run: |
          git fetch origin main
          git diff origin/main > diff.txt

      - name: Trim diff
        run: |
          head -n 300 diff.txt > small_diff.txt

      - name: Get Developer Comments
        run: |
          git log -1 --pretty=%B > claude_comments.txt

      - name: Build Full Input
        run: |
          {
            cat prompts/CODEX.txt
            printf '\n\n## CODE DIFF\n\n'
            cat small_diff.txt
            printf '\n\n## DEVELOPER COMMENTS\n\n'
            cat claude_comments.txt
          } > full_input.txt

      - name: Create JSON Payload
        run: |
          JSON=$(jq -n --arg input "$(cat full_input.txt)" '{
            model: "gpt-4.1-mini",
            input: $input
          }')

          echo "$JSON" > request.json

          echo "===== REQUEST JSON ====="
          cat request.json

      - name: Call OpenAI API
        run: |
          curl https://api.openai.com/v1/responses \
            -H "Authorization: Bearer ${{ secrets.OPENAI_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d @request.json > review.json

          echo "===== RAW RESPONSE ====="
          cat review.json

      - name: Extract Review
        run: |
          REVIEW=$(jq -r '.output[0].content[0].text // "No review generated"' review.json)

          echo "$REVIEW" > final_review.txt

          echo "==== Final Review ===="
          cat final_review.txt

      - name: Comment PR
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "$(cat final_review.txt)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
